title: UIトレース
description: UIトレースの手順を記録する
heroImage: /blog-placeholder-3.jpg
pubDate: 2024-09-07
updatedDate: 2024-09-07
workflow:
- title: トレースの目的を決める
  description: |-
    やはり最初は目的を決めることが重要.
    - ツールのトレーニングをする.
    - コンポーネントの理解度を上げる
    - レイアウトやスタイルの理解度を上げる
    - プロダクト全体の構成を把握する
    - 造形力を上げる
  priority: A
  weight: light
  duration: "00:30:00"
  references:
    - "https://note.com/hitosuke/n/n9850afd72b0b"
- title: トレースの準備をする
  priority: A
  description: |-
    トレースもとになるサービスのスクショを取る.
    - [Longshot](https://play.google.com/store/apps/details?id=com.as.screenshot.capture.longshot.newapp&hl=ja)というアプリを使うと便利.
    - [開発者向けオプション](https://note.com/hitosuke/n/n9850afd72b0b)でPCとつなげるのもあり.
- title: トレースする
  priority: A
  description: |-
    **やらないことを決める**
    - アイコンはトレースせず, 写真は同じものを使う.
    - Noto JPだけを使う
    など. 決めた目的に注力する.
  workflow:
    - title: 円形シェイプを4つほど作る
      priority: C
      description: |-
        primary colorなどをfigmaなどでスタイル化するためにスクリーンショットから色を抽出する.
        また, 色の勉強にもなる.
    - title: 背景色をアートボードに適用する.
      priority: C
      description: ''
    - title: 半透明なシェイプでコンポーネントをトレースする.
      priority: C
      description: |-
        赤や緑などの色を使う.
        以下を意識することが重要
      workflow:
        - title: 公式リソースの活用
          priority: C
          description: ''
        - title: 不可視領域の再現
          priority: B
          description: ''
        - title: シンボル化のタイミング
          priority: B
          description: ''
- title: トレースの終わりに
  priority: B
  description: 全体像を把握するため
  workflow:
    - title: 作り手の思考をトレースする.
      description: |-
        ユースケースの流れを把握するため
        - ユースケース1
        - ユースケース2
    - title: 学びを記録する
      description: 'ESLint, Prettier, Storybook, Jest, CiCD, etc'
